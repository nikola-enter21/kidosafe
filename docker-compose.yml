version: '3.9'

services:

  # ── PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: kidosafe_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-kidosafe}
      POSTGRES_USER:     ${POSTGRES_USER:-kidosafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kidosafe_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kidosafe} -d ${POSTGRES_DB:-kidosafe}"]
      interval: 5s
      timeout: 5s
      retries: 10


volumes:
  postgres_data:
    driver: local
